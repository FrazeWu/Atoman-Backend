name: atoman-backend

services:
  backend:
    env_file:
      - .env.prod
    build:
      context: .
      dockerfile: Dockerfile
    image: ${ATOMAN_BACKEND_IMAGE:-atoman-backend}:${ATOMAN_BACKEND_VERSION:-local}
    restart: unless-stopped
    environment:
      ENV: production
      GIN_MODE: release
      PORT: "8080"
      LOG_DIR: /app/log
      BASE_URL: ${BASE_URL:?set BASE_URL in .env.prod}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:?set ALLOWED_ORIGINS in .env.prod}
      AUTH_COOKIE_DOMAIN: ${AUTH_COOKIE_DOMAIN:-}
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET in .env.prod}
      TURNSTILE_SECRET_KEY: ${TURNSTILE_SECRET_KEY:-}
      DATABASE_TYPE: postgres
      DATABASE_URL: ${DATABASE_URL:?set Neon DATABASE_URL in .env.prod}
      STORAGE_TYPE: s3
      PUBLIC_UPLOADS_BASE_URL: ${PUBLIC_UPLOADS_BASE_URL:?set PUBLIC_UPLOADS_BASE_URL in .env.prod}
      S3_REGION: ${S3_REGION:-auto}
      S3_ENDPOINT: ${S3_ENDPOINT:?set S3_ENDPOINT in .env.prod}
      S3_BUCKET: ${S3_BUCKET:?set S3_BUCKET in .env.prod}
      S3_URL_PREFIX: ${S3_URL_PREFIX:?set S3_URL_PREFIX in .env.prod}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:?set AWS_ACCESS_KEY_ID in .env.prod}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:?set AWS_SECRET_ACCESS_KEY in .env.prod}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      FROM_EMAIL: ${FROM_EMAIL:-}
      OWNER_USERNAME: ${OWNER_USERNAME:-}
      OWNER_EMAIL: ${OWNER_EMAIL:-}
      OWNER_PASSWORD: ${OWNER_PASSWORD:-}
    ports:
      - "${GATEWAY_HTTP_PORT:-80}:80"
      - "${GATEWAY_HTTPS_PORT:-443}:443"
    volumes:
      - backend-logs:/app/log
      - ./nginx/ssl:/etc/nginx/ssl:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:8080/swagger/index.html || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 45s
    logging:
      driver: json-file
      options:
        max-size: ${LOG_MAX_SIZE:-10m}
        max-file: ${LOG_MAX_FILE:-3}

volumes:
  backend-logs:
