name: atoman-dev

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: atoman
      POSTGRES_PASSWORD: atoman_secret
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - atoman-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U atoman -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 20

  db-init:
    image: postgres:16-alpine
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGPASSWORD: atoman_secret
    command:
      - /bin/sh
      - -lc
      - |
        psql -h postgres -U atoman -d postgres -c "CREATE DATABASE atoman_dev;" || true
    restart: "no"

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9101"
    ports:
      - "9100:9000"
      - "9101:9101"
    volumes:
      - atoman-minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 20

  minio-setup:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb -p local/atoman-dev || true &&
      mc anonymous set public local/atoman-dev || true
      "
    restart: "no"

volumes:
  atoman-postgres-data:
  atoman-minio-data:
