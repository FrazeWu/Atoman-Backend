info:
  contact: {}
  description: Atoman 后端 API 文档。
  title: Atoman API
  version: "1.0"
paths:
  /api/v1/admin/artists/{id}/merge:
    post:
      consumes:
      - application/json
      description: 将源艺人的关联关系、修订和讨论迁移到目标艺人，并设置 redirect_to。
      parameters:
      - description: 目标艺人 UUID
        in: path
        name: id
        required: true
        type: string
      - description: 艺人合并输入
        in: body
        name: input
        required: true
        schema:
          $ref: '#/definitions/handlers.ArtistMergeInput'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.MessageResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      security:
      - BearerAuth: []
      - CookieAuth: []
      summary: 合并艺人
      tags:
      - music-artists
  /api/v1/admin/comment-reports:
    get:
      parameters:
      - description: 状态：pending/upheld/rejected
        in: query
        name: status
        type: string
      - default: 1
        description: 页码
        in: query
        name: page
        type: integer
      - default: 20
        description: 每页数量，最多50
        in: query
        name: page_size
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/comment.ReportQueueResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/comment.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/comment.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/comment.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/comment.ErrorResponse'
      security:
      - BearerAuth: []
      - CookieAuth: []
      summary: 获取评论举报队列
      tags:
      - comment-admin
  /api/v1/admin/comments/{comment_id}/moderation:
    put:
      consumes:
      - application/json
      parameters:
      - description: 评论 UUID
        in: path
        name: comment_id
        required: true
        type: string
      - description: 审核动作
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/comment.ModerateInput'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/comment.ActionResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/comment.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/comment.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/comment.ErrorResponse'
        "404":
