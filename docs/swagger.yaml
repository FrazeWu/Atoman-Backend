info:
  contact: {}
  description: Atoman 后端 API 文档。
  title: Atoman API
  version: "1.0"
paths:
  /api/v1/admin/artists/{id}/merge:
    post:
      consumes:
      - application/json
      description: 将源艺人的关联关系、修订和讨论迁移到目标艺人，并设置 redirect_to。
      parameters:
      - description: 目标艺人 UUID
        in: path
        name: id
        required: true
        type: string
      - description: 艺人合并输入
        in: body
        name: input
        required: true
        schema:
          $ref: '#/definitions/internal_handlers.ArtistMergeInput'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_handlers.MessageResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_handlers.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_handlers.ErrorResponse'
      security:
      - BearerAuth: []
      - CookieAuth: []
      summary: 合并艺人
      tags:
      - music-artists
  /api/v1/admin/discussions/{id}:
    delete:
      description: 管理员可软删除任意讨论。
