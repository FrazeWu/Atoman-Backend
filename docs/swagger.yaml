  /api/v1/videos:
    get:
      description: 匿名返回公开已发布视频；有效认证按本人频道或合集筛选时也返回本人的非公开视频。
      parameters:
      - description: 频道 UUID
        in: query
        name: channel_id
        type: string
      - description: 合集 UUID
        in: query
        name: collection_id
        type: string
      - description: 标签
        in: query
        name: tag
        type: string
      - description: 排序方式
        enum:
        - latest
        - popular
        in: query
        name: sort
        type: string
      - default: 1
        description: 页码
        in: query
        name: page
        type: integer
      - description: 返回数量上限
        in: query
        name: limit
        type: integer
      - description: 仅返回当前用户订阅频道的视频
        in: query
        name: subscribed
        type: boolean
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/model.Video'
            type: array
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
